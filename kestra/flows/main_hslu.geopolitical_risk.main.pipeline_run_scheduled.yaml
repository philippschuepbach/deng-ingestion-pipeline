id: pipeline_run_scheduled
namespace: hslu.geopolitical_risk.main

labels:
  name: pipeline_run_scheduled

tasks:
  - id: load_lookups
    type: io.kestra.plugin.core.flow.Subflow
    namespace: hslu.geopolitical_risk.subflows
    flowId: load_lookups
    wait: true
    transmitFailed: true

  - id: manifest_sync
    type: io.kestra.plugin.core.flow.Subflow
    namespace: hslu.geopolitical_risk.subflows
    flowId: manifest_sync
    wait: true
    transmitFailed: true
    inputs:
      years: 0
      months: 0
      days: 0

  - id: export_ingest_all
    type: io.kestra.plugin.core.flow.Subflow
    namespace: hslu.geopolitical_risk.subflows
    flowId: export_ingest_all
    wait: true
    transmitFailed: true

  - id: silver_transform_all
    type: io.kestra.plugin.core.flow.Subflow
    namespace: hslu.geopolitical_risk.subflows
    flowId: silver_transform_all
    wait: true
    transmitFailed: true

  - id: gold_build
    type: io.kestra.plugin.core.flow.Subflow
    namespace: hslu.geopolitical_risk.subflows
    flowId: gold_build
    wait: true
    transmitFailed: true

triggers:
  - id: every_15_minutes
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "*/15 * * * *"
    timezone: Europe/Zurich
