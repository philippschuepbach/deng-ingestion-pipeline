repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check src --fix
        language: system
        pass_filenames: false
        files: ^src/.*\.py$

      - id: black
        name: black
        entry: uv run black src
        language: system
        pass_filenames: false
        files: ^src/.*\.py$

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        files: ^src/.*\.py$
