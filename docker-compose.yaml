services:
  pgdatabase:
    image: postgres:18@sha256:ddbc320a9ad558c01c719248108e607eadde92fea799fec799028cfb2fab7319
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - "gdelt_data:/var/lib/postgresql"
      - "./sql:/docker-entrypoint-initdb.d:ro"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10
    mem_limit: 3g
    mem_reservation: 1g
    cpus: 2.0
    networks:
      - pipeline_net

  pgadmin:
    image: dpage/pgadmin4@sha256:ff557f69d9808085dc3554f56c1b06a36ac8cddabe4485212920b9604261abdb
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
    volumes:
      - "pgadmin_data:/var/lib/pgadmin"
    ports:
      - "8085:80"
    depends_on:
      pgdatabase:
        condition: service_healthy
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 1.0
    networks:
      - pipeline_net

  pipeline:
    image: geopolitical-risk-ingestion-pipeline:latest
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      POSTGRES_HOST: "${APP_POSTGRES_HOST}"
      POSTGRES_PORT: "${APP_POSTGRES_PORT}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      LOG_LEVEL: "${LOG_LEVEL}"
      UV_LINK_MODE: "${UV_LINK_MODE}"
    volumes:
      - ".:/app"
      - "pipeline_data:/app/data"
      - "pipeline_venv:/app/.venv"
    depends_on:
      pgdatabase:
        condition: service_healthy
    profiles:
      - manual
    mem_limit: 3g
    mem_reservation: 1g
    cpus: 2.0
    networks:
      - pipeline_net

  kestra_postgres:
    image: postgres:17@sha256:28ed727ae9f0f4e0e19e88055e1158c1ac2d5ac35d87bdbe869a9cc99bfe618c
    restart: unless-stopped
    volumes:
      - "kestra_postgres_data:/var/lib/postgresql"
    environment:
      POSTGRES_DB: "${KESTRA_POSTGRES_DB}"
      POSTGRES_USER: "${KESTRA_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${KESTRA_POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0
    networks:
      - pipeline_net

  kestra:
    build:
      context: .
      dockerfile: Dockerfile.kestra
    restart: unless-stopped
    volumes:
      - "kestra_data:/app/storage"
      - "kestra_tmp:/tmp/kestra-wd"
      - "./kestra/flows:/flows"
      - ".:/workspace"
      - "kestra_workspace_data:/workspace/data"
      - "kestra_workspace_venv:/workspace/.venv"
      - "kestra_uv_cache:/root/.cache/uv"
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/${KESTRA_POSTGRES_DB}
            driverClassName: org.postgresql.Driver
            username: "${KESTRA_POSTGRES_USER}"
            password: "${KESTRA_POSTGRES_PASSWORD}"
        endpoints:
          prometheus:
            enabled: false
        micronaut:
          metrics:
            export:
              prometheus:
                enabled: false
          io:
            watch:
              enabled: true
              paths:
                - /flows
        kestra:
          tutorial-flows:
            enabled: false
          server:
            basicAuth:
              username: "${KESTRA_BASIC_AUTH_USERNAME}"
              password: "${KESTRA_BASIC_AUTH_PASSWORD}"
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: ${KESTRA_URL}
      POSTGRES_HOST: "${APP_POSTGRES_HOST}"
      POSTGRES_PORT: "${APP_POSTGRES_PORT}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      LOG_LEVEL: "${LOG_LEVEL}"
      UV_LINK_MODE: "${UV_LINK_MODE}"
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      kestra_postgres:
        condition: service_healthy
      pgdatabase:
        condition: service_healthy
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2.0
    networks:
      - pipeline_net

  grafana:
    image: grafana/grafana-oss@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
    ports:
      - "3000:3000"
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/dashboards:/var/lib/grafana/dashboards:ro"
    depends_on:
      pgdatabase:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0
    networks:
      - pipeline_net

volumes:
  gdelt_data:
  pgadmin_data:
  kestra_postgres_data:
  kestra_data:
  kestra_tmp:
  kestra_workspace_data:
  kestra_workspace_venv:
  kestra_uv_cache:
  pipeline_data:
  pipeline_venv:
  grafana_data:

networks:
  pipeline_net:
